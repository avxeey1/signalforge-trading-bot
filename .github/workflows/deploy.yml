name: Run SignalForge Bot

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Start bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DESTINATION_ADDRESS: ${{ secrets.DESTINATION_ADDRESS }}
          TRADE_AMOUNT_SOL: ${{ secrets.TRADE_AMOUNT_SOL || '0.0215' }}
          TARGET_MULTIPLIER: ${{ secrets.TARGET_MULTIPLIER || '2.0' }}
          DEFAULT_BOT_STATUS: ${{ secrets.DEFAULT_BOT_STATUS || 'running' }}
        run: python src/main.py
